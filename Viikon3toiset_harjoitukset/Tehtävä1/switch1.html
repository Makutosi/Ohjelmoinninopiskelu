    <h2>Tehtävä 1</h2>
    <h3>Scrabble-peli</h3>
    <p>Syötä Scrabble-pelin sana ja
      ohjelma laskee kirjain pisteet.</p>
    <ul>
      <li>Vokaalit: A, E, I, O, U = 1p</li>
      <li>S, C, R, B, L = 2p</li>
      <li>Umlaut: Ä, Ö, Ü = 5p</li>
      <li>X, Y, Z, W = 8p</li>
      <li>K, G, P = 10p</li>
      <li>muut kirjaimet = 3p</li>
    </ul>
    <form class="" action="index.html" method="post">
      <p>Syötä sana: <input type="text" id="scrabble" value=""></p>

      <div id="check"></div>
    </form>
